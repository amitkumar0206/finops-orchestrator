# ====================================================================
# DEMO-ONLY Docker Compose Configuration
# Purpose: Run aasmaa demo locally without RDS/Valkey/ALB
# Cost: $0 (local) or ~$12-13/month on EC2 t3.small
# ====================================================================

services:
  backend:
    image: ${BACKEND_IMAGE_URI:?Backend image URI required}
    container_name: aasmaa-demo-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # ============================================================
      # DEMO MODE - Enables synthetic user injection + no DB access
      # ============================================================
      DEMO_MODE: "${DEMO_MODE:-true}"
      DATABASE_ENABLED: "${DATABASE_ENABLED:-false}"
      CHAT_HISTORY_ENABLED: "${CHAT_HISTORY_ENABLED:-false}"

      # Synthetic demo user context (avoid DB lookups)
      DEMO_USER_ID: "${DEMO_USER_ID:-11111111-1111-1111-1111-111111111111}"
      DEMO_USER_EMAIL: "${DEMO_USER_EMAIL:-demo@aasmaa.ai}"
      DEMO_ORGANIZATION_ID: "${DEMO_ORGANIZATION_ID:-22222222-2222-2222-2222-222222222222}"
      DEMO_ORGANIZATION_NAME: "${DEMO_ORGANIZATION_NAME:-Demo Organization}"
      DEMO_ALLOWED_ACCOUNT_IDS: "${DEMO_ALLOWED_ACCOUNT_IDS:-123456789012}"

      # ============================================================
      # AWS & Data Settings
      # ============================================================
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      S3_BUCKET: "${S3_BUCKET:-aasmaa-demo-data-152924644003}"
      AWS_S3_BUCKET: "${S3_BUCKET:-aasmaa-demo-data-152924644003}"
      CUR_BUCKET_NAME: "${CUR_BUCKET_NAME:-aasmaa-demo-data-152924644003}"
      CUR_S3_BUCKET: "${S3_BUCKET:-aasmaa-demo-data-152924644003}"
      CUR_S3_PREFIX: "${CUR_S3_PREFIX:-cost-exports/aasmaa-cost-export}"
      ATHENA_OUTPUT_LOCATION: "s3://${S3_BUCKET:-aasmaa-demo-data-152924644003}/athena-results/"

      # Glue Database config for Athena queries
      AWS_CUR_DATABASE: "${AWS_CUR_DATABASE:-cost_usage_db}"
      AWS_CUR_TABLE: "${AWS_CUR_TABLE:-cur_data}"

      # ============================================================
      # LLM Model Selection (Nova Lite = cheapest for demo)
      # ============================================================
      LLM_PROVIDER: "${LLM_PROVIDER:-bedrock}"
      BEDROCK_MODEL_ID: "${BEDROCK_MODEL_ID:-us.amazon.nova-lite-v1:0}"
      DEFAULT_LLM_MODEL: "${BEDROCK_MODEL_ID:-us.amazon.nova-lite-v1:0}"

      # ============================================================
      # Application Settings
      # ============================================================
      ENVIRONMENT: "production"
      TRUSTED_PROXY_COUNT: "${TRUSTED_PROXY_COUNT:-0}" # Direct access, no reverse proxy
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-[\"http://localhost\",\"http://localhost:3000\",\"http://127.0.0.1:3000\",\"http://127.0.0.1:80\"]}"

      # Database placeholders (ignored when DATABASE_ENABLED=false)
      POSTGRES_HOST: "localhost"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "aasmaa"
      POSTGRES_USER: "aasmaa"

      # Cache placeholders (ignored in demo mode)
      VALKEY_HOST: "localhost"
      VALKEY_PORT: "6379"

    # Demo mode doesn't require secrets (no DB auth, no field encryption)
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

    networks:
      - demo-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE_URI:?Frontend image URI required}
    container_name: aasmaa-demo-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      # Tell frontend where backend is
      BACKEND_URL: "http://backend:8000"
      VITE_BACKEND_URL: "${VITE_BACKEND_URL:-http://localhost:8000}"

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    networks:
      - demo-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    restart: unless-stopped

networks:
  demo-network:
    driver: bridge
